<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0d0d0d"/>
  <!-- connector lines -->
  <line x1="16" y1="16" x2="7" y2="9"  stroke="#ff6b00" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="25" y2="9"  stroke="#ff6b00" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="7" y2="23" stroke="#ff6b00" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="25" y2="23" stroke="#ff6b00" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- outer nodes -->
  <circle cx="7"  cy="9"  r="3" fill="#ff6b00" fill-opacity="0.25" stroke="#ff6b00" stroke-width="1.2"/>
  <circle cx="25" cy="9"  r="3" fill="#ff6b00" fill-opacity="0.25" stroke="#ff6b00" stroke-width="1.2"/>
  <circle cx="7"  cy="23" r="3" fill="#ff6b00" fill-opacity="0.25" stroke="#ff6b00" stroke-width="1.2"/>
  <circle cx="25" cy="23" r="3" fill="#ff6b00" fill-opacity="0.25" stroke="#ff6b00" stroke-width="1.2"/>
  <!-- center orb -->
  <circle cx="16" cy="16" r="5" fill="#ff6b00" fill-opacity="0.9"/>
  <circle cx="16" cy="16" r="5" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
